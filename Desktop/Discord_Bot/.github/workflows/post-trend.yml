name: Post Trend Brief

on:
  workflow_dispatch:
    inputs:
      track:
        description: "Trend track name"
        required: true
        default: "nlp"
      source_file:
        description: "Path to source json file"
        required: true
        default: "content/trends/sources/nlp_sources.json"
      dry_run:
        description: "Skip real Discord webhook post"
        required: false
        default: "false"
  schedule:
    - cron: "0 1 * * *"

jobs:
  post-trend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Post trend brief
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          python scripts/post_trend_brief.py \
            --track "${{ inputs.track || 'nlp' }}" \
            --source-file "${{ inputs.source_file || 'content/trends/sources/nlp_sources.json' }}" \
            ${{ inputs.dry_run == 'true' && '--dry-run' || '' }}
