name: Post Concept Brief

on:
  workflow_dispatch:
    inputs:
      brief_path:
        description: "Path to concept markdown file"
        required: false
        default: ""
      dry_run:
        description: "Skip real Discord webhook post"
        required: false
        default: "false"
  schedule:
    - cron: "0 0 * * 1-5"

jobs:
  post-concept:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Post concept queue
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          BRIEF_PATH: ${{ inputs.brief_path }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: |
          args=(python scripts/post_concept_queue.py --manifest-file "content/concepts/manifest.json" --progress-file "content/concepts/history/concept_progress.json")
          if [ -n "${BRIEF_PATH}" ]; then
            args+=(--brief-path "$BRIEF_PATH")
          fi
          if [ "${DRY_RUN}" = "true" ]; then
            args+=(--dry-run)
          fi
          "${args[@]}"

      - name: Commit concept progress
        if: ${{ inputs.dry_run != 'true' }}
        run: |
          if git diff --quiet -- content/concepts/history/concept_progress.json; then
            echo "No concept progress changes"
            exit 0
          fi
          git add content/concepts/history/concept_progress.json
          git -c user.name="github-actions[bot]" -c user.email="41898282+github-actions[bot]@users.noreply.github.com" commit -m "update concept queue progress"
          git push
