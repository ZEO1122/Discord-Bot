name: Post Trend Brief

on:
  workflow_dispatch:
    inputs:
      track:
        description: "Trend track name"
        required: true
        default: "nlp"
      max_results:
        description: "How many recent sources to fetch"
        required: false
        default: "5"
      dry_run:
        description: "Skip real Discord webhook post"
        required: false
        default: "false"
  schedule:
    - cron: "0 1 * * *"

jobs:
  post-trend:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Post trend brief
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          TRACK: ${{ inputs.track }}
          MAX_RESULTS: ${{ inputs.max_results }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: |
          track="${TRACK:-nlp}"
          max_results="${MAX_RESULTS:-5}"
          args=(python scripts/post_trend_brief.py --track "$track" --max-results "$max_results" --history-file "content/trends/history/published_trends.json")
          if [ "${DRY_RUN}" = "true" ]; then
            args+=(--dry-run)
          fi
          "${args[@]}"

      - name: Commit trend history
        if: ${{ inputs.dry_run != 'true' }}
        run: |
          if git diff --quiet -- content/trends/history/published_trends.json; then
            echo "No trend history changes"
            exit 0
          fi
          git add content/trends/history/published_trends.json
          git -c user.name="github-actions[bot]" -c user.email="41898282+github-actions[bot]@users.noreply.github.com" commit -m "update trend publish history"
          git push
