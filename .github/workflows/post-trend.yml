name: Post Trend Brief

on:
  workflow_dispatch:
    inputs:
      track:
        description: "Trend track name"
        required: true
        default: "nlp"
      source_file:
        description: "Path to source json file"
        required: true
        default: "content/trends/sources/nlp_sources.json"
      dry_run:
        description: "Skip real Discord webhook post"
        required: false
        default: "false"
  schedule:
    - cron: "0 1 * * *"

jobs:
  post-trend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Post trend brief
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          TRACK: ${{ inputs.track }}
          SOURCE_FILE: ${{ inputs.source_file }}
          DRY_RUN: ${{ inputs.dry_run }}
        run: |
          track="${TRACK:-nlp}"
          source_file="${SOURCE_FILE:-content/trends/sources/nlp_sources.json}"
          args=(python scripts/post_trend_brief.py --track "$track" --source-file "$source_file")
          if [ "${DRY_RUN}" = "true" ]; then
            args+=(--dry-run)
          fi
          "${args[@]}"
